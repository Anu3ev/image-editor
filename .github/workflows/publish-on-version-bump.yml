name: Publish & Release on version bump

on:
  push:
    branches:
      - master
    paths:
      - 'package.json'

permissions:
  contents: write
  id-token: write

jobs:
  publish-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check package.json version bump
        id: check_bump
        run: |
          git diff --quiet HEAD^ HEAD -- package.json && {
            echo "package.json не менялся — пропускаем всё"
            echo "should_publish=false" >> $GITHUB_OUTPUT
            exit 0
          }
          if git diff HEAD^ HEAD -- package.json | grep -q '"version":'; then
            echo "Обнаружен bump версии в package.json"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "package.json менялся, но версия осталась прежней — пропускаем"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve release version and tag
        id: release_info
        if: steps.check_bump.outputs.should_publish == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Create Git tag
        if: steps.check_bump.outputs.should_publish == 'true'
        run: |
          TAG="${{ steps.release_info.outputs.TAG }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Тэг $TAG уже существует → пропускаем его создание"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release (softprops)
        if: steps.check_bump.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_info.outputs.TAG }}
          name: "Release ${{ steps.release_info.outputs.TAG }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.check_bump.outputs.should_publish == 'true'
        run: |
          VERSION="${{ steps.release_info.outputs.VERSION }}"

          echo "► Публикация пакета в npm (version=${VERSION})"
          npm publish --access public

      - name: Delete tag and release after failed publish flow
        if: failure() && steps.check_bump.outputs.should_publish == 'true'
        run: |
          TAG="${{ steps.release_info.outputs.TAG }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git push origin ":refs/tags/$TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
